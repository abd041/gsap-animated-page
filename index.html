<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSAP ScrollTrigger Story</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/split-type"></script>

<style>
body{
margin:0;
font-family:sans-serif;
}

/* LOADER */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
color:white;

display:flex;
justify-content:center;
align-items:center;

z-index:9999;
}

.logo{
font-size:60px;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.hero-title{
font-size:70px;
opacity:0;
}

</style>
</head>

<body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSAP Parallax Example</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="loader">
  <h1 class="logo">MyBrand</h1>
</div>

<section class="hero">
  <h1 class="hero-title">Next-Gen Experience</h1>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
<script src="script.js"></script>

</body>
</html>

<script>
gsap.registerPlugin(ScrollTrigger);
const lenis = new Lenis({
  duration: 1.2,
  smooth: true
});

const tl = gsap.timeline();

tl.from(".logo", {
y:100,
opacity:0,
duration:1
})

.to(".loader", {
y:"-100%",
duration:1
})

.from(".hero-title", {
y:80,
opacity:0,
duration:1
});


function raf(time) {

  lenis.raf(time);

  requestAnimationFrame(raf);

}

requestAnimationFrame(raf);
</script>

</body>
</html>
