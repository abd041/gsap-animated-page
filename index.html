<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSAP ScrollTrigger Story</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script src="https://unpkg.com/split-type"></script>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
}

/* HERO SECTION */

.hero{
height:100vh;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* LAYERS */

.layer{
position:absolute;
width:100%;
height:120%;
object-fit:cover;
}

/* DEPTH ORDER */

.bg{
z-index:1;
}

.mountain{
z-index:2;
}

.product{
z-index:3;
width:400px;
height:auto;
left:50%;
transform:translateX(-50%);
top:40%;
}

/* TEXT */

.title{
position:relative;
z-index:4;
font-size:70px;
text-align:center;
}

/* CONTENT SECTION */

.content{
height:150vh;
padding:100px;
font-size:30px;
}

</style>
</head>

<body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSAP Parallax Example</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<section class="hero">

<img class="layer bg"
src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000&auto=format&fit=crop">

<img class="layer mountain"
src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=2000&auto=format&fit=crop">

<img class="layer product"
src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=800&auto=format&fit=crop">

<h1 class="title">Next-Gen Experience</h1>

</section>

<section class="content">

<h2>Scroll Down</h2>
<p>Watch the parallax effect in action.</p>

</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<script src="script.js"></script>

</body>
</html>

<script>
gsap.registerPlugin(ScrollTrigger);

/* BACKGROUND - SLOW */

gsap.to(".bg", {

y: -150,
ease: "none",

scrollTrigger: {
trigger: ".hero",
start: "top bottom",
end: "bottom top",
scrub: true
}

});

/* MOUNTAIN - MEDIUM */

gsap.to(".mountain", {

y: -250,
ease: "none",

scrollTrigger: {
trigger: ".hero",
start: "top bottom",
end: "bottom top",
scrub: true
}

});

/* PRODUCT - FAST */

gsap.to(".product", {

y: -400,
ease: "none",

scrollTrigger: {
trigger: ".hero",
start: "top bottom",
end: "bottom top",
scrub: true
}

});

</script>

</body>
</html>
