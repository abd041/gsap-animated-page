<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Loader Animation</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loader h1 {
      font-size: 64px;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .main-content {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .hero {
      text-align: center;
    }

    .hero-title {
      font-size: 72px;
      margin-bottom: 20px;
      line-height: 1;
    }

    .hero-text {
      font-size: 20px;
      color: rgba(255,255,255,0.7);
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .left{
      background-color: aquamarine;
    }
    .right{
      background-color: blueviolet;
    }
    .panel {
  width: 50%;
  height: 100%;
}
  </style>
</head>
<body>

<div class="loader">
  <div class="panel left"></div>
  <div class="panel right"></div>
</div>

  <div class="main-content">
    <section class="hero">
      <h1 class="hero-title">Welcome to My Website</h1>
      <p class="hero-text">
        This is the main content of the page. The loader fades out smoothly,
        slides away, and then reveals the hero section with a clean animation.
      </p>
    </section>
  </div>

  <script>
    const tl = gsap.timeline()

  tl.to(".panel.left",{
    xPercent: -100,
    duration:4,     
  }).to(".panel.right",{
     xPercent: 100,
    duration:2,
  }, "<")
    .from(".hero-title", {
      y: 100,
      opacity: 0,
      duration: 1
    }, "-=0.5")
    .from(".hero-text", {
      y: 50,
      opacity: 0,
      duration: 1
    }, "-=0.7")
  </script>

</body>
</html>
