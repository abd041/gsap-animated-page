<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSAP Mask Reveal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
background:black;
}

/* REVEAL SECTION */

.reveal-section{
padding:150px 10%;
background:#151515;
}

/* MASK */

.image-mask{
width:600px;
height:400px;
overflow:hidden;
margin:auto;
}

/* IMAGE */

.image-mask img{
width:100%;
height:100%;
object-fit:cover;
transform:translateY(100%);
}

/* TEXT */

.reveal-text{
font-size:40px;
text-align:center;
margin-top:40px;
opacity:0;
}

.after{
height:120vh;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

</style>
</head>

<body>

<section class="hero">
Mask Reveal Demo
</section>


<section class="reveal-section">

<div class="image-mask">

<img class="reveal-img"
src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?w=1200">

</div>

<h2 class="reveal-text">
Premium Product Experience
</h2>

</section>


<section class="after">
More Content
</section>



<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>


<script>

gsap.registerPlugin(ScrollTrigger);


/* LENIS SMOOTH SCROLL */

const lenis = new Lenis({
duration:1.2
});

lenis.on("scroll", ScrollTrigger.update);

function raf(time){

lenis.raf(time);

requestAnimationFrame(raf);

}

requestAnimationFrame(raf);


/* IMAGE REVEAL */

gsap.to(".reveal-img",{

y:0,
duration:1.5,
ease:"power3.out",

scrollTrigger:{
trigger:".image-mask",
start:"top 80%"
}

});


/* TEXT REVEAL */

gsap.to(".reveal-text",{

opacity:1,
y:-20,
duration:1,

scrollTrigger:{
trigger:".reveal-text",
start:"top 85%"
}

});

</script>

</body>
</html>
