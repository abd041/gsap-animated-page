<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Loader + Hero Animation</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #050816;
      color: white;
      overflow: hidden;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: #050816;
      z-index: 9999;
      overflow: hidden;
    }

    .loader-top,
    .loader-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(135deg, #0f172a, #020617);
    }

    .loader-top {
      top: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .loader-bottom {
      bottom: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .loader-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .loader-text {
      font-size: 90px;
      font-weight: 700;
      letter-spacing: 12px;
      text-transform: uppercase;
      overflow: hidden;
      line-height: 1;
    }

    .loader-text span {
      display: inline-block;
    }

    .loader-bar {
      width: 300px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      margin-top: 30px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar-fill {
      position: absolute;
      inset: 0;
      background: white;
      transform: scaleX(0);
      transform-origin: left center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8%;
      position: relative;
      overflow: hidden;
    }

    .hero-left {
      width: 50%;
      z-index: 2;
    }

    .hero-subtitle {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(60px, 8vw, 120px);
      line-height: 0.95;
      font-weight: 700;
      overflow: hidden;
    }

    .hero-title span {
      display: block;
      overflow: hidden;
    }

    .hero-title span span {
      display: inline-block;
    }

    .hero-text {
      max-width: 600px;
      font-size: 18px;
      line-height: 1.8;
      color: rgba(255,255,255,0.65);
      margin-top: 30px;
    }

    .hero-button {
      margin-top: 40px;
      padding: 18px 36px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 15px;
      border-radius: 999px;
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: 0.3s;
    }

    .hero-button:hover {
      background: white;
      color: black;
    }

    .hero-right {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .hero-image {
      width: 420px;
      height: 420px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(139,92,246,0.15));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }

    .hero-image::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(56,189,248,0.2);
      top: -60px;
      right: -60px;
      filter: blur(40px);
    }

    .hero-image::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(168,85,247,0.2);
      bottom: -40px;
      left: -40px;
      filter: blur(40px);
    }
  </style>
</head>
<body>

  <div class="loader">
    <div class="loader-top"></div>
    <div class="loader-bottom"></div>

    <div class="loader-content">
      <div class="loader-text">
        <span>L</span>
        <span>O</span>
        <span>A</span>
        <span>D</span>
        <span>I</span>
        <span>N</span>
        <span>G</span>
      </div>

      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <section class="hero">
    <div class="hero-left">
      <div class="hero-subtitle">Creative Studio</div>

      <h1 class="hero-title">
        <span><span>Building</span></span>
        <span><span>Premium</span></span>
        <span><span>Experiences</span></span>
      </h1>

      <p class="hero-text">
        A connected loader and hero reveal feels much smoother because the page
        entrance becomes part of the experience instead of feeling like a separate animation.
      </p>

      <button class="hero-button">Explore More</button>
    </div>

    <div class="hero-right">
      <div class="hero-image"></div>
    </div>
  </section>

  <script>
    const tl = gsap.timeline()

    tl.from(".loader-text span", {
      y: 120,
      opacity: 0,
      stagger: 0.08,
      duration: 0.8,
      ease: "power4.out"
    })
    .to(".loader-bar-fill", {
      scaleX: 1,
      duration: 1,
      ease: "power2.inOut"
    }, "-=0.3")
    .to(".loader-text span", {
      y: -120,
      opacity: 0,
      stagger: 0.05,
      duration: 0.6,
      ease: "power4.in"
    }, "+=0.2")
    .to(".loader-top", {
      yPercent: -100,
      duration: 1.2,
      ease: "power4.inOut"
    }, "-=0.1")
    .to(".loader-bottom", {
      yPercent: 100,
      duration: 1.2,
      ease: "power4.inOut"
    }, "<")
    .to(".loader", {
      opacity: 0,
      pointerEvents: "none",
      duration: 0.2
    }, "-=0.2")
    .from(".hero-subtitle", {
      y: 40,
      opacity: 0,
      duration: 0.8,
      ease: "power3.out"
    }, "-=0.6")
    .from(".hero-title span span", {
      y: 150,
      opacity: 0,
      stagger: 0.12,
      duration: 1,
      ease: "power4.out"
    }, "-=0.6")
    .from(".hero-text", {
      y: 40,
      opacity: 0,
      duration: 0.8,
      ease: "power3.out"
    }, "-=0.7")
    .from(".hero-button", {
      y: 30,
      opacity: 0,
      duration: 0.8,
      ease: "power3.out"
    }, "-=0.6")
    .from(".hero-image", {
      scale: 1.2,
      opacity: 0,
      rotate: 8,
      duration: 1.4,
      ease: "power4.out"
    }, "-=1.1")

    gsap.to(".hero-image", {
      y: -20,
      duration: 3,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    })
  </script>

</body>
</html>
